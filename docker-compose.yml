services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=7010
    ports:
      - "7010:7010"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "7011:7011"
    command: >
      /bin/sh -c "sed -i 's/listen  *80;/listen 7011;/' /etc/nginx/conf.d/default.conf
      && exec nginx -g 'daemon off;'"
